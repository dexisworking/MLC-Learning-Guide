<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Mind Map — MLC Learning Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070c;font-family:'Inter',sans-serif;overflow:hidden;height:100vh}

/* Topbar */
.topbar{
  position:fixed;top:0;left:0;right:0;height:52px;background:#111118ee;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid #252535;display:flex;align-items:center;
  padding:0 1.25rem;gap:.75rem;z-index:100;
}
.logo{font-size:.95rem;font-weight:700;background:linear-gradient(135deg,#6366f1,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.nav-btn{
  padding:.35rem .8rem;border-radius:.5rem;border:1px solid #252535;color:#6868a0;
  font-size:.75rem;text-decoration:none;transition:all .2s;font-family:inherit;
  background:transparent;cursor:pointer;
}
.nav-btn:hover{border-color:#6366f1;color:#fff}

/* Search */
.search-box{
  margin-left:auto;position:relative;
}
.search-input{
  background:#1a1a24;border:1px solid #252535;border-radius:.5rem;
  padding:.35rem .75rem .35rem 1.8rem;color:#e0e0f0;font-size:.78rem;
  font-family:inherit;width:180px;outline:none;transition:all .25s;
}
.search-input:focus{border-color:#6366f1;width:220px}
.search-icon{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);font-size:.72rem;color:#6868a0;pointer-events:none}

/* Legend */
.legend{display:flex;gap:.6rem;flex-wrap:wrap;margin-left:.5rem}
.leg{display:flex;align-items:center;gap:.3rem;font-size:.68rem;color:#8080b0}
.leg-dot{width:8px;height:8px;border-radius:50%}

/* Controls panel */
.controls-panel{
  position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  display:flex;gap:.5rem;z-index:100;
  background:#111118ee;backdrop-filter:blur(12px);
  padding:.5rem .75rem;border-radius:.75rem;border:1px solid #252535;
}
.ctrl-btn{
  width:34px;height:34px;border-radius:.5rem;border:1px solid #252535;
  background:transparent;color:#8080b0;font-size:.85rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
  font-family:inherit;
}
.ctrl-btn:hover{border-color:#6366f1;color:#fff;background:#1a1a24}
.ctrl-btn.active{border-color:#6366f1;color:#6366f1;background:#6366f110}

/* Info panel */
.info-panel{
  position:fixed;bottom:5rem;right:1.5rem;width:260px;
  background:#111118ee;backdrop-filter:blur(12px);
  border:1px solid #252535;border-radius:.85rem;padding:1.25rem;
  z-index:100;opacity:0;transform:translateY(8px);
  transition:all .3s ease;pointer-events:none;
}
.info-panel.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.info-title{font-size:.95rem;font-weight:700;margin-bottom:.35rem}
.info-desc{font-size:.78rem;color:#8080b0;line-height:1.5;margin-bottom:.5rem}
.info-path{font-size:.68rem;color:#505070;display:flex;align-items:center;gap:.3rem}
.info-children{font-size:.72rem;color:#6366f1;margin-top:.4rem}

/* Hint overlay */
.hint-overlay{
  position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);
  background:#111118ee;backdrop-filter:blur(12px);
  border:1px solid #252535;border-radius:.6rem;padding:.5rem 1rem;
  font-size:.72rem;color:#6868a0;z-index:90;
  transition:opacity .5s;display:flex;align-items:center;gap:.5rem;
}
.hint-key{
  background:#1a1a24;border:1px solid #252535;border-radius:.25rem;
  padding:.1rem .35rem;font-size:.68rem;color:#a0a0c0;
}

svg{width:100vw;height:100vh;cursor:grab}
svg:active{cursor:grabbing}

/* Node styles */
.node{cursor:pointer}
.node circle{stroke-width:2.5;transition:all .3s ease}
.node:hover circle{filter:drop-shadow(0 0 8px currentColor)}
.node text{font-family:'Inter',sans-serif;pointer-events:none;transition:all .3s}
.node .count-badge{font-size:8px;fill:#fff;font-weight:700}
.link{fill:none;stroke-width:1.8;opacity:.35;transition:opacity .3s}
.link.highlighted{opacity:.9;stroke-width:2.5}
.node.highlighted circle{filter:drop-shadow(0 0 12px currentColor);stroke-width:3}
.node.dimmed{opacity:.15}
.link.dimmed{opacity:.06}
.node.search-match circle{filter:drop-shadow(0 0 14px #f59e0b);stroke:#f59e0b!important}
.node.search-match text{fill:#f59e0b!important;font-weight:700!important}

@media(max-width:768px){
  .legend{display:none}
  .search-input{width:120px}
  .search-input:focus{width:160px}
  .info-panel{right:.75rem;left:.75rem;width:auto;bottom:4.5rem}
  .controls-panel{bottom:1rem}
}
</style>
</head>
<body>

<div class="topbar">
  <a href="/index.html" class="nav-btn">← Home</a>
  <div class="logo">🗺️ ML Mind Map</div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#6366f1"></div>Supervised</div>
    <div class="leg"><div class="leg-dot" style="background:#8b5cf6"></div>Unsupervised</div>
    <div class="leg"><div class="leg-dot" style="background:#06b6d4"></div>Neural Nets</div>
    <div class="leg"><div class="leg-dot" style="background:#f59e0b"></div>Advanced</div>
    <div class="leg"><div class="leg-dot" style="background:#10b981"></div>RL</div>
    <div style="font-size:.65rem;color:#505070;margin-left:1rem;border-left:1px solid #252535;padding-left:1rem">by <b>Dex</b></div>
  </div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Search nodes..." autocomplete="off">
  </div>
</div>

<svg id="svg"></svg>

<div class="controls-panel">
  <button class="ctrl-btn" id="zoomIn" title="Zoom In">+</button>
  <button class="ctrl-btn" id="zoomOut" title="Zoom Out">−</button>
  <button class="ctrl-btn" id="resetView" title="Center View">⊙</button>
  <button class="ctrl-btn" id="expandAll" title="Expand All">⊞</button>
  <button class="ctrl-btn" id="collapseAll" title="Collapse All">⊟</button>
</div>

<div class="info-panel" id="infoPanel">
  <div class="info-title" id="infoTitle"></div>
  <div class="info-desc" id="infoDesc"></div>
  <div class="info-children" id="infoChildren"></div>
  <div class="info-path" id="infoPath"></div>
</div>

<div class="hint-overlay" id="hintOverlay">
  <span class="hint-key">Click</span> expand/collapse
  <span class="hint-key">Hover</span> details
  <span class="hint-key">Scroll</span> zoom
  <span class="hint-key">Drag</span> pan
</div>

<script>
const DATA = {
  name:"Machine Learning",color:"#a5b4fc",info:"Complete ML curriculum — 5 chapters, 70+ concepts",
  children:[
    {name:"Supervised Learning",color:"#6366f1",info:"Learn from labeled input-output pairs",children:[
      {name:"Classification",color:"#818cf8",info:"Predict discrete categories",children:[
        {name:"Logistic Regression",color:"#818cf8",info:"Sigmoid → probability between 0 and 1"},
        {name:"Decision Trees",color:"#818cf8",info:"Split data on feature thresholds"},
        {name:"SVM",color:"#818cf8",info:"Maximize margin between classes"},
        {name:"Naive Bayes",color:"#818cf8",info:"Probabilistic classifier using Bayes' theorem"},
      ]},
      {name:"Regression",color:"#818cf8",info:"Predict continuous numerical values",children:[
        {name:"Linear Regression",color:"#818cf8",info:"y = mx + b — fit a straight line"},
        {name:"Ridge / Lasso",color:"#818cf8",info:"Regularized regression to prevent overfitting"},
      ]},
      {name:"Evaluation Metrics",color:"#818cf8",info:"Measure model performance",children:[
        {name:"Accuracy & F1",color:"#818cf8",info:"Overall and balanced classification metrics"},
        {name:"MSE · RMSE · R²",color:"#818cf8",info:"Regression error metrics"},
        {name:"Precision & Recall",color:"#818cf8",info:"Trade-off: exactness vs completeness"},
      ]},
      {name:"Key Concepts",color:"#818cf8",info:"Fundamental ideas",children:[
        {name:"Overfitting",color:"#818cf8",info:"Model memorizes noise in training data"},
        {name:"Underfitting",color:"#818cf8",info:"Model too simple to capture patterns"},
        {name:"Train/Test Split",color:"#818cf8",info:"Separate data for training and evaluation"},
      ]},
    ]},
    {name:"Unsupervised Learning",color:"#8b5cf6",info:"Discover patterns in unlabeled data",children:[
      {name:"Clustering",color:"#a78bfa",info:"Group similar data points",children:[
        {name:"K-Means",color:"#a78bfa",info:"Partition into K clusters by nearest centroid"},
        {name:"K-Medoids",color:"#a78bfa",info:"Uses actual data points as cluster centers"},
        {name:"DBSCAN",color:"#a78bfa",info:"Density-based — finds arbitrary-shaped clusters"},
        {name:"Hierarchical",color:"#a78bfa",info:"Agglomerative (bottom-up) or divisive (top-down)"},
      ]},
      {name:"Elbow Method",color:"#a78bfa",info:"Find optimal K by plotting WCSS vs K"},
      {name:"Association Rules",color:"#a78bfa",info:"Find co-occurrence patterns",children:[
        {name:"Apriori",color:"#a78bfa",info:"Breadth-first frequent itemset mining"},
        {name:"ECLAT",color:"#a78bfa",info:"Depth-first using TID-list intersections"},
        {name:"Support · Confidence · Lift",color:"#a78bfa",info:"Metrics for rule quality"},
      ]},
      {name:"Dimensionality Reduction",color:"#a78bfa",info:"Reduce feature space",children:[
        {name:"PCA",color:"#a78bfa",info:"Principal Component Analysis — linear projection"},
        {name:"t-SNE",color:"#a78bfa",info:"Non-linear visualization for high-dim data"},
      ]},
    ]},
    {name:"Neural Networks",color:"#06b6d4",info:"Brain-inspired computational models",children:[
      {name:"Neuron Model",color:"#22d3ee",info:"z = Σ(wx) + b → f(z)",children:[
        {name:"Weights & Bias",color:"#22d3ee",info:"Learnable parameters of each connection"},
        {name:"Activation Functions",color:"#22d3ee",info:"Introduce non-linearity",children:[
          {name:"ReLU",color:"#22d3ee",info:"max(0, x) — most widely used"},
          {name:"Sigmoid",color:"#22d3ee",info:"Output (0,1) — binary classification"},
          {name:"Tanh",color:"#22d3ee",info:"Output (-1,1) — zero-centered"},
          {name:"Softmax",color:"#22d3ee",info:"Multiclass probability distribution"},
        ]},
      ]},
      {name:"Training",color:"#22d3ee",info:"How neural networks learn",children:[
        {name:"Forward Propagation",color:"#22d3ee",info:"Input → layers → prediction"},
        {name:"Loss Function",color:"#22d3ee",info:"Quantifies prediction error"},
        {name:"Backpropagation",color:"#22d3ee",info:"Compute gradients layer by layer"},
        {name:"Gradient Descent",color:"#22d3ee",info:"w ← w − α·∂L/∂w — minimize loss"},
      ]},
      {name:"Architectures",color:"#22d3ee",info:"Different network designs",children:[
        {name:"Perceptron",color:"#22d3ee",info:"Single layer — linear boundary only"},
        {name:"Deep NN",color:"#22d3ee",info:"Multiple hidden layers for complex patterns"},
        {name:"CNN",color:"#22d3ee",info:"Convolutional — specialized for images"},
        {name:"RNN / LSTM",color:"#22d3ee",info:"Recurrent — for sequences and time series"},
        {name:"Autoencoder",color:"#22d3ee",info:"Compress → latent space → reconstruct"},
      ]},
    ]},
    {name:"Advanced Learning",color:"#f59e0b",info:"Techniques beyond single models",children:[
      {name:"Ensemble Methods",color:"#fbbf24",info:"Combine models for better accuracy",children:[
        {name:"Bagging",color:"#fbbf24",info:"Parallel training — reduces variance",children:[
          {name:"Random Forest",color:"#fbbf24",info:"Bagging + random feature subsets per split"},
        ]},
        {name:"Boosting",color:"#fbbf24",info:"Sequential training — reduces bias",children:[
          {name:"AdaBoost",color:"#fbbf24",info:"Re-weights misclassified samples each round"},
          {name:"Gradient Boosting",color:"#fbbf24",info:"Each model fits the residual errors"},
          {name:"XGBoost",color:"#fbbf24",info:"Optimized, regularized gradient boosting"},
        ]},
      ]},
      {name:"Active Learning",color:"#fbbf24",info:"Model queries human for uncertain labels"},
      {name:"KNN",color:"#fbbf24",info:"K-Nearest Neighbors",children:[
        {name:"Distance Metrics",color:"#fbbf24",info:"Euclidean, Manhattan, Cosine similarity"},
        {name:"Choosing K",color:"#fbbf24",info:"K = √n as a starting heuristic"},
      ]},
      {name:"Bias–Variance",color:"#fbbf24",info:"The fundamental ML trade-off"},
    ]},
    {name:"Reinforcement Learning",color:"#10b981",info:"Learn through trial, error, and rewards",children:[
      {name:"Core Loop",color:"#34d399",info:"Agent ↔ Environment interaction",children:[
        {name:"Agent",color:"#34d399",info:"The learner and decision-maker"},
        {name:"Environment",color:"#34d399",info:"The world the agent acts in"},
        {name:"State · Action · Reward",color:"#34d399",info:"S→A→R→S' — the RL cycle"},
        {name:"Policy π",color:"#34d399",info:"Strategy mapping states to actions"},
      ]},
      {name:"Value Functions",color:"#34d399",info:"Estimate expected future rewards",children:[
        {name:"V(s)",color:"#34d399",info:"State value — how good is this state?"},
        {name:"Q(s,a)",color:"#34d399",info:"Action value — how good is this action here?"},
      ]},
      {name:"Q-Learning",color:"#34d399",info:"Off-policy temporal difference learning",children:[
        {name:"Q-Table",color:"#34d399",info:"Lookup table of values per (state, action)"},
        {name:"Bellman Equation",color:"#34d399",info:"Q = Q + α[R + γ·maxQ' − Q]"},
        {name:"ε-Greedy",color:"#34d399",info:"Explore with probability ε, exploit otherwise"},
      ]},
      {name:"Concepts",color:"#34d399",info:"Key RL ideas",children:[
        {name:"Discount Factor γ",color:"#34d399",info:"How much to value future rewards"},
        {name:"Markov Property",color:"#34d399",info:"Future depends only on current state"},
        {name:"Exploration vs Exploitation",color:"#34d399",info:"The fundamental RL dilemma"},
      ]},
    ]},
  ]
};

// Setup
const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select("#svg");
const g = svg.append("g");

// Zoom behavior
const zoomBehavior = d3.zoom()
  .scaleExtent([0.15, 3])
  .on("zoom", e => g.attr("transform", e.transform));
svg.call(zoomBehavior);

const tree = d3.tree().nodeSize([28, 240]);
const diagonal = d3.linkHorizontal().x(d => d.y).y(d => d.x);

const root = d3.hierarchy(DATA);
root.x0 = 0; root.y0 = 0;
let nodeId = 0;

// Collapse helper
function collapse(d) {
  if(d.children){d._children=d.children;d._children.forEach(collapse);d.children=null;}
}
function expandAll(d) {
  if(d._children){d.children=d._children;d._children=null;}
  if(d.children) d.children.forEach(expandAll);
}

// Start with chapter-level expanded, rest collapsed
root.children.forEach(ch => {
  if(ch.children) ch.children.forEach(collapse);
});

// Center the tree on screen — use live dimensions
function centerView(duration=600) {
  const w = window.innerWidth;
  const h = window.innerHeight;
  // Root is at (0,0) in g-space. Place it at 30% from left, vertically centered
  const t = d3.zoomIdentity.translate(w * 0.3, h * 0.5).scale(0.75);
  if(duration > 0) {
    svg.transition().duration(duration).call(zoomBehavior.transform, t);
  } else {
    svg.call(zoomBehavior.transform, t);
  }
}

// Count descendants
function countLeaves(d) {
  if(!d.children && !d._children) return 1;
  let c = 0;
  (d.children || d._children || []).forEach(ch => c += countLeaves(ch));
  return c;
}

// Get ancestry path
function getPath(d) {
  const path = [];
  let cur = d;
  while(cur) { path.unshift(cur.data.name); cur = cur.parent; }
  return path;
}

// Info panel
const infoPanel = document.getElementById('infoPanel');
function showInfo(d) {
  document.getElementById('infoTitle').textContent = d.data.name;
  document.getElementById('infoTitle').style.color = d.data.color;
  document.getElementById('infoDesc').textContent = d.data.info || '';
  const kids = (d.children || d._children || []).length;
  const leaves = countLeaves(d);
  document.getElementById('infoChildren').textContent = kids > 0 ? `${kids} direct · ${leaves} total subtopics` : 'Leaf node';
  document.getElementById('infoPath').textContent = getPath(d).join(' → ');
  infoPanel.classList.add('visible');
}
function hideInfo() { infoPanel.classList.remove('visible'); }

// Highlight ancestors on hover
function highlightAncestors(d) {
  const ancestors = new Set();
  let cur = d;
  while(cur) { ancestors.add(cur); cur = cur.parent; }
  g.selectAll('.node').classed('dimmed', n => !ancestors.has(n)).classed('highlighted', n => ancestors.has(n));
  g.selectAll('.link').classed('dimmed', l => !ancestors.has(l.target)).classed('highlighted', l => ancestors.has(l.target));
}
function clearHighlight() {
  g.selectAll('.node').classed('dimmed', false).classed('highlighted', false);
  g.selectAll('.link').classed('dimmed', false).classed('highlighted', false);
}

// Main update
function update(src) {
  tree(root);
  const duration = 400;
  const nodes = root.descendants();
  const links = root.links();

  // Links
  const link = g.selectAll("path.link").data(links, d => d.target.id || (d.target.id = ++nodeId));

  link.enter().insert("path","g").attr("class","link")
    .style("stroke", d => d.target.data.color)
    .attr("d", () => { const o = {x:src.x0, y:src.y0}; return diagonal({source:o,target:o}); })
    .merge(link).transition().duration(duration)
    .attr("d", diagonal);

  link.exit().transition().duration(duration)
    .attr("d", () => { const o = {x:src.x, y:src.y}; return diagonal({source:o,target:o}); }).remove();

  // Nodes
  const node = g.selectAll("g.node").data(nodes, d => d.id || (d.id = ++nodeId));

  const enter = node.enter().append("g").attr("class","node")
    .attr("transform", `translate(${src.y0},${src.x0})`)
    .on("click", (e, d) => {
      if(d.children){d._children=d.children;d.children=null;}
      else if(d._children){d.children=d._children;d._children=null;}
      update(d);
    })
    .on("mouseenter", (e, d) => { showInfo(d); highlightAncestors(d); })
    .on("mouseleave", () => { hideInfo(); clearHighlight(); });

  enter.append("circle")
    .attr("r", 0)
    .style("stroke", d => d.data.color);

  enter.append("text")
    .attr("dy", "0.32em")
    .style("opacity", 0);

  // Count badge for collapsed nodes
  enter.append("circle").attr("class","count-bg").attr("r",0);
  enter.append("text").attr("class","count-badge").style("opacity",0);

  const nodeUpdate = enter.merge(node);

  nodeUpdate.transition().duration(duration)
    .attr("transform", d => `translate(${d.y},${d.x})`);

  nodeUpdate.select("circle:not(.count-bg)").transition().duration(duration)
    .attr("r", d => d.depth === 0 ? 10 : d.depth === 1 ? 7 : 5)
    .style("fill", d => d._children ? d.data.color : (d.children ? "#111118" : d.data.color + "30"))
    .style("stroke", d => d.data.color);

  nodeUpdate.select("text:not(.count-badge)").transition().duration(duration)
    .style("opacity", 1)
    .attr("x", d => (d.children || d._children) ? -14 : 10)
    .style("text-anchor", d => (d.children || d._children) ? "end" : "start")
    .style("font-size", d => d.depth === 0 ? "14px" : d.depth === 1 ? "12px" : "11px")
    .style("font-weight", d => d.depth <= 1 ? "700" : "400")
    .style("fill", d => d.depth === 0 ? "#fff" : d.data.color)
    .text(d => d.data.name);

  // Collapsed children count badge
  nodeUpdate.select("circle.count-bg").transition().duration(duration)
    .attr("r", d => d._children ? 7 : 0)
    .attr("cx", d => d._children ? ((d.children || d._children) ? -14 : 10) + (d.depth === 0 ? 20 : 16) : 0)
    .style("fill", d => d.data.color)
    .style("opacity", d => d._children ? .8 : 0);

  nodeUpdate.select("text.count-badge").transition().duration(duration)
    .style("opacity", d => d._children ? 1 : 0)
    .attr("x", d => d._children ? ((d.children || d._children) ? -14 : 10) + (d.depth === 0 ? 20 : 16) : 0)
    .attr("dy", "0.35em")
    .style("text-anchor", "middle")
    .text(d => d._children ? d._children.length : "");

  node.exit().transition().duration(duration)
    .attr("transform", `translate(${src.y},${src.x})`).remove()
    .select("circle").attr("r", 0);
  node.exit().select("text").style("opacity", 0);

  nodes.forEach(d => {d.x0 = d.x; d.y0 = d.y;});
}

update(root);

// Apply initial centering synchronously
centerView(0);
// Re-center with smooth animation after layout settles
setTimeout(() => centerView(600), 50);

// Also re-center on window resize
window.addEventListener('resize', () => centerView(400));

// Controls
document.getElementById('zoomIn').onclick = () => svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.4);
document.getElementById('zoomOut').onclick = () => svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.7);
document.getElementById('resetView').onclick = () => centerView(500);
document.getElementById('expandAll').onclick = () => { expandAll(root); update(root); };
document.getElementById('collapseAll').onclick = () => { root.children.forEach(collapse); update(root); centerView(); };

// Search
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if(!q) { g.selectAll('.node').classed('search-match',false).classed('dimmed',false); return; }
  const allNodes = root.descendants();
  const matches = new Set();
  allNodes.forEach(d => {
    if(d.data.name.toLowerCase().includes(q) || (d.data.info && d.data.info.toLowerCase().includes(q))){
      let cur = d;
      while(cur){matches.add(cur);cur=cur.parent;}
    }
  });
  g.selectAll('.node').classed('search-match', d => d.data.name.toLowerCase().includes(q) || (d.data.info && d.data.info.toLowerCase().includes(q)))
    .classed('dimmed', d => !matches.has(d));
});

// Dismiss hint after first interaction
let hinted = false;
svg.on('mousedown.hint', () => {
  if(!hinted){document.getElementById('hintOverlay').style.opacity='0';hinted=true;
    setTimeout(()=>document.getElementById('hintOverlay').style.display='none',500);}
});

// Keyboard: Escape to clear search
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') { searchInput.value=''; searchInput.dispatchEvent(new Event('input')); searchInput.blur(); }
  if(e.key === '/' && document.activeElement !== searchInput) { e.preventDefault(); searchInput.focus(); }
});
</script>
</body>
</html>

[build]
  publish = "."
  command  = ""

# Cache static assets
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.md"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type  = "text/plain; charset=utf-8"

# Clean URLs
[[redirects]]
  from   = "/flashcards"
  to     = "/flashcards.html"
  status = 200

[[redirects]]
  from   = "/mindmap"
  to     = "/mindmap.html"
  status = 200

[[redirects]]
  from   = "/reader"
  to     = "/reader.html"
  status = 200

# Fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404
